<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>九境書庫｜庫內閱讀</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="icon" type="image/png" sizes="64x64" href="/images/favicon.png?v=1">
</head>
<body class="has-topbar" data-page-type="reading">

  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-left">
        <a class="home-link" href="./index.html" aria-label="回 九境書庫首頁">
          <span class="topbar-icon">⌂</span>
          <span>九境書庫</span>
        </a>
        <nav class="breadcrumb" id="breadcrumbNav"></nav>
      </div>
      <div class="topbar-right">
        <button class="theme-toggle" type="button" id="themeToggle" aria-label="切換深色與淺色">
          <span class="topbar-icon" id="themeIcon">☾</span>
          <span id="themeText">深色</span>
        </button>
      </div>
    </div>
  </div>

  <div class="reading-wrap">
    <a class="back-link" id="backToDetail" href="./index.html">← 回劇本首頁</a>

   <!--  <article class="reading-article">
      <h1 id="readingTitle">讀取中...</h1>
      <div class="meta" id="readingMeta">讀取中...</div>
      <div id="readingContent">
        <p>資料讀取中...</p>
      </div>
      <hr />
      <div class="btn-row" id="readingLinks"></div>
    </article> -->
    <article class="reading-article">
      <section class="reading-hero-banner" id="readingHeroBanner">
        <div class="reading-hero-shade"></div>
        <div class="reading-hero-copy">
          <h1 id="readingTitle">讀取中...</h1>
          <div class="meta" id="readingMeta">讀取中...</div>
        </div>
      </section>

      <div id="readingContent">
        <p>資料讀取中...</p>
      </div>
      <hr />
      <div class="btn-row" id="readingLinks"></div>
    </article>
  </div>

  <script>
    const titleEl = document.getElementById('readingTitle');
    const metaEl = document.getElementById('readingMeta');
    const contentEl = document.getElementById('readingContent');
    const linksEl = document.getElementById('readingLinks');
    const backToDetailEl = document.getElementById('backToDetail');
    const breadcrumbNav = document.getElementById('breadcrumbNav');
    const heroBannerEl = document.getElementById('readingHeroBanner');

    const esc = s => String(s ?? '').replace(/[&<>\"]/g, m => ({
      '&':'&amp;',
      '<':'&lt;',
      '>':'&gt;',
      '"':'&quot;'
    }[m]));

    const getIdFromHash = () => decodeURIComponent(location.hash.replace('#', '').trim());

    function buildMeta(item) {
      const parts = [];

      if (item.world) {
        parts.push(item.world);
      }

      if (item.character) {
        parts.push(item.character);
      }

      if (item.date) {
        parts.push(item.date);
      }

      if (Array.isArray(item.tags) && item.tags.length) {
        parts.push(item.tags.join('、'));
      }

      return parts.join('｜');
    }

    function renderBreadcrumb(item, id) {
      const titleText = item.nodeTitle || item.title || '劇本介紹頁';

      const link = (href, text) => `<a href="${href}">${esc(text)}</a>`;
      const current = (text) => `<span class="current">${esc(text)}</span>`;
      const sep = () => `<span class="separator">|</span>`;

      breadcrumbNav.innerHTML = [
        link(`./detail.html#${encodeURIComponent(id)}`, titleText),
        sep(),
        current('庫內閱讀')
      ].join('');
    }

    async function initReadingPage() {
      const id = getIdFromHash();

      if (!id) {
        titleEl.textContent = '找不到劇本';
        metaEl.textContent = '';
        contentEl.innerHTML = '<p>沒有選擇藏書。目前不知道要讀哪一本。</p>';
        linksEl.innerHTML = '';
        return;
      }

      try {
        const [scriptsRes, contentRes] = await Promise.all([
          fetch('../../data/scripts/scripts.json'),
          fetch('../../data/scripts/script-content.json')
        ]);

        const [scriptsData, contentData] = await Promise.all([
          scriptsRes.json(),
          contentRes.json()
        ]);

        const scriptItem = scriptsData.find(item => item.id === id);
        const contentItem = contentData.find(item => item.id === id);

        if (!scriptItem) {
          titleEl.textContent = '找不到劇本資料';
          metaEl.textContent = '';
          contentEl.innerHTML = '<p>scripts.json 裡找不到這個 id。</p>';
          linksEl.innerHTML = '';
          return;
        }

        const pageTitle = scriptItem.nodeTitle
          ? `${scriptItem.title}｜${scriptItem.nodeTitle}`
          : scriptItem.title;

        titleEl.textContent = pageTitle;
        metaEl.textContent = buildMeta(scriptItem);
        document.title = `${pageTitle}｜庫內閱讀`;
        applyReadingCover(scriptItem);

        if (contentItem && Array.isArray(contentItem.content) && contentItem.content.length) {
          contentEl.innerHTML = contentItem.content
            .map(p => `<p>${esc(p)}</p>`)
            .join('');
        } else {
          contentEl.innerHTML = '<p>這篇還沒有庫內閱讀內容。</p>';
        }

        const detailHref = `./detail.html#${encodeURIComponent(id)}`;
        backToDetailEl.href = detailHref;

        if (Array.isArray(scriptItem.links) && scriptItem.links.length) {
          linksEl.innerHTML = scriptItem.links.map((link, index) => `
            <a
              class="btn ${index === 0 ? 'primary' : 'ghost'}"
              href="${esc(link.url)}"
              target="_blank"
              rel="noreferrer"
            >${esc(link.name)}</a>
          `).join('');
        } else {
          linksEl.innerHTML = '';
        }

        renderBreadcrumb(scriptItem, id);

      } catch (error) {
        console.error(error);
        titleEl.textContent = '讀取失敗';
        metaEl.textContent = '';
        contentEl.innerHTML = '<p>JSON 資料載入失敗。請確認檔案路徑與格式。</p>';
        linksEl.innerHTML = '';
      }
    }

    function getReadingCover(item) {
       const raw =
        item.cover ||
        item.image ||
        item.coverPath ||
        item.thumbnail ||
        '';

      if (!raw) return '';
      if (/^https?:\/\//i.test(raw)) return raw;

      let path = raw.trim();

      if (path.startsWith('./')) path = path.slice(2);
      if (path.startsWith('/')) path = path.slice(1);

      if (path.startsWith('data/')) {
        return new URL(`../../${path}`, location.href).href;
      }

      return new URL(path, location.href).href;
    }

    function applyReadingCover(item) {
      const cover = getReadingCover(item);
      console.log('reading cover:', cover);

      if (!cover) {
        document.body.classList.remove('has-reading-cover');
        document.documentElement.style.removeProperty('--reading-cover-url');
        if (heroBannerEl) heroBannerEl.classList.add('no-cover');
        return;
      }

      document.body.classList.add('has-reading-cover');
      document.documentElement.style.setProperty(
        '--reading-cover-url',
        `url("${cover}")`
      );

      if (heroBannerEl) {
        heroBannerEl.classList.remove('no-cover');
      }
    }

    initReadingPage();
  </script>

  <script>
    (function () {
      const key = "site-theme";
      const html = document.documentElement;
      const toggle = document.getElementById("themeToggle");
      const text = document.getElementById("themeText");
      const icon = document.getElementById("themeIcon");

      function applyTheme(theme) {
        html.setAttribute("data-theme", theme);
        if (text) text.textContent = theme === "light" ? "淺色" : "深色";
        if (icon) icon.textContent = theme === "light" ? "☀" : "☾";
      }

      const saved = localStorage.getItem(key);
      const prefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
      applyTheme(saved || (prefersLight ? "light" : "dark"));

      if (toggle) {
        toggle.addEventListener("click", function () {
          const current = html.getAttribute("data-theme") === "light" ? "light" : "dark";
          const next = current === "light" ? "dark" : "light";
          localStorage.setItem(key, next);
          applyTheme(next);
        });
      }
    })();
  </script>
<script src="./protect.js"></script>
</body>
</html>
