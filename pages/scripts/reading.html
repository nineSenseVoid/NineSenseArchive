<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>九境書庫｜庫內閱讀</title>

    <!-- Open Graph -->
  <meta property="og:title" content="九境書庫 NineSense Archive">
  <meta property="og:description" content="境有萬千，書藏於此。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bluesense.tw/ninesensearchive">
  <meta property="og:image" content="https://bluesense.tw/images/og-cover.jpg">
  <meta property="og:site_name" content="九境書庫">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="九境書庫 NineSense Archive">
  <meta name="twitter:description" content="境有萬千，書藏於此。">
  <meta name="twitter:image" content="https://bluesense.tw/images/og-cover.jpg">
  <link rel="canonical" href="https://bluesense.tw/ninesensearchive">
  <meta name="theme-color" content="#0f0b12">

  <link rel="stylesheet" href="../../css/style.css?v=20260508-2" />
  <link rel="icon" type="image/png" sizes="64x64" href="/images/favicon.png?v=1">
</head>
<body class="has-topbar" data-page-type="reading">

  <div class="topbar">
    <div class="topbar-inner">
      <div class="topbar-left">
        <a class="home-link" href="./index.html" aria-label="回 九境書庫首頁">
          <span class="topbar-icon">⌂</span>
          <span>九境書庫</span>
        </a>
        <nav class="breadcrumb" id="breadcrumbNav"></nav>
      </div>
      <div class="topbar-right">
        <span class="reading-progress-label" id="readingProgressLabel">閱讀 0%</span>
        <button class="theme-toggle" type="button" id="themeToggle" aria-label="切換深色與淺色">
          <span class="topbar-icon" id="themeIcon">☾</span>
          <span id="themeText">深色</span>
        </button>
      </div>
    </div>
    <div class="reading-progress-track" aria-hidden="true">
      <div class="reading-progress-fill" id="readingProgressFill"></div>
    </div>
  </div>

  <div class="reading-wrap">
   <!--  <article class="reading-article">
      <h1 id="readingTitle">讀取中...</h1>
      <div class="meta" id="readingMeta">讀取中...</div>
      <div id="readingContent">
        <p>資料讀取中...</p>
      </div>
      <hr />
      <div class="btn-row" id="readingLinks"></div>
    </article> -->

    <div class="reading-fixed-stage" id="readingFixedStage">
      <a class="back-link" id="backToDetail" href="./index.html">← 回劇本首頁</a>

      <section class="reading-hero-banner" id="readingHeroBanner">
        <div class="reading-hero-shade"></div>
        <div class="reading-hero-copy">
          <h1 id="readingTitle">讀取中...</h1>
          <div class="meta" id="readingMeta">讀取中...</div>
        </div>
      </section>
    </div>

    <article class="reading-article">
      <div class="reading-content" id="readingContent">
        <p>資料讀取中...</p>
      </div>

      <div class="reading-realm-divider" aria-hidden="true">
        <span>✦</span>
      </div>

      <section class="reading-afterword" id="readingAfterword" hidden>
        <div class="reading-afterword-label">✦ 來自彼境的低語</div>
        <div class="reading-afterword-content" id="readingOpeningLine">讀取中...</div>
        <div class="reading-afterword-speaker" id="readingOpeningSpeaker">角色</div>
      </section>

      <section class="reading-exit">
        <div class="reading-exit-note" id="readingExitNote">
          書頁已至此處。若願繼續前行，可留在書庫回望篇章。
        </div>
        <div class="btn-row reading-link-row" id="readingLinks"></div>
      </section>
    </article>
  </div>

  <script>
    const titleEl = document.getElementById('readingTitle');
    const metaEl = document.getElementById('readingMeta');
    const contentEl = document.getElementById('readingContent');
    const linksEl = document.getElementById('readingLinks');
    const backToDetailEl = document.getElementById('backToDetail');
    const breadcrumbNav = document.getElementById('breadcrumbNav');
    const heroBannerEl = document.getElementById('readingHeroBanner');
    const readingAfterword = document.getElementById('readingAfterword');
    const readingOpeningLine = document.getElementById('readingOpeningLine');
    const readingOpeningSpeaker = document.getElementById('readingOpeningSpeaker');
    const readingProgressFill = document.getElementById('readingProgressFill');
    const readingProgressLabel = document.getElementById('readingProgressLabel');
    const readingFixedStage = document.getElementById('readingFixedStage');
    const readingExitNote = document.getElementById('readingExitNote');

    const esc = s => String(s ?? '').replace(/[&<>\"]/g, m => ({
      '&':'&amp;',
      '<':'&lt;',
      '>':'&gt;',
      '"':'&quot;'
    }[m]));

    const getIdFromHash = () => decodeURIComponent(location.hash.replace('#', '').trim());

    function hideReadingAfterword() {
      if (readingAfterword) readingAfterword.hidden = true;
    }

    function buildMeta(item) {
      const parts = [];

      if (item.world) {
        parts.push(item.world);
      }

      if (item.character) {
        parts.push(item.character);
      }

      if (item.date) {
        parts.push(item.date);
      }

      if (Array.isArray(item.tags) && item.tags.length) {
        parts.push(item.tags.join('、'));
      }

      return parts.join('｜');
    }

    function renderBreadcrumb(item, id) {
      const titleText = item.nodeTitle || item.title || '劇本介紹頁';

      const link = (href, text) => `<a href="${href}">${esc(text)}</a>`;
      const current = (text) => `<span class="current">${esc(text)}</span>`;
      const sep = () => `<span class="separator">|</span>`;

      breadcrumbNav.innerHTML = [
        link(`./detail.html#${encodeURIComponent(id)}`, titleText),
        sep(),
        current('庫內閱讀')
      ].join('');
    }

    function updateReadingStageSpace() {
      if (!readingFixedStage) return;
      const stageHeight = Math.ceil(readingFixedStage.getBoundingClientRect().height);
      document.documentElement.style.setProperty('--reading-stage-height', `${stageHeight}px`);
    }

    function updateReadingProgress() {
      const doc = document.documentElement;
      const scrollTop = window.scrollY || doc.scrollTop || 0;
      const maxScroll = Math.max(1, doc.scrollHeight - window.innerHeight);
      const ratio = Math.min(1, Math.max(0, scrollTop / maxScroll));
      const percent = Math.round(ratio * 100);

      if (readingProgressFill) {
        readingProgressFill.style.transform = `scaleX(${ratio})`;
      }

      if (readingProgressLabel) {
        readingProgressLabel.textContent = `閱讀 ${percent}%`;
      }

      /* // 背景微視差：不是淡化，而是讓遠景慢慢漂移。
      document.documentElement.style.setProperty('--reading-bg-y', `${52 + ratio * 8}%`);
      document.documentElement.style.setProperty('--reading-bg-scale', `${1.04 + ratio * 0.025}`);
 */
      document.body.classList.toggle('is-reading-scrolled', scrollTop > 24);
    }

    let readingProgressRaf = null;

    function requestReadingProgressUpdate() {
      if (readingProgressRaf) return;
      readingProgressRaf = requestAnimationFrame(() => {
        readingProgressRaf = null;
        updateReadingProgress();
      });
    }

    async function initReadingPage() {
      const id = getIdFromHash();

      if (!id) {
        titleEl.textContent = '找不到劇本';
        metaEl.textContent = '';
        contentEl.innerHTML = '<p>沒有選擇藏書。目前不知道要讀哪一本。</p>';
        linksEl.innerHTML = '';
        hideReadingAfterword();
        return;
      }

      try {
        const [scriptsRes, contentRes] = await Promise.all([
          fetch('../../data/scripts/scripts.json'),
          fetch('../../data/scripts/script-content.json')
        ]);

        const [scriptsData, contentData] = await Promise.all([
          scriptsRes.json(),
          contentRes.json()
        ]);

        const scriptItem = scriptsData.find(item => item.id === id);
        const contentItem = contentData.find(item => item.id === id);

        if (!scriptItem) {
          titleEl.textContent = '找不到劇本資料';
          metaEl.textContent = '';
          contentEl.innerHTML = '<p>scripts.json 裡找不到這個 id。</p>';
          linksEl.innerHTML = '';
          hideReadingAfterword();
          return;
        }

        const pageTitle = scriptItem.nodeTitle
          ? `${scriptItem.title}｜${scriptItem.nodeTitle}`
          : scriptItem.title;

        titleEl.textContent = pageTitle;
        metaEl.textContent = buildMeta(scriptItem);
        document.title = `${pageTitle}｜庫內閱讀`;
        applyReadingCover(scriptItem);

        if (contentItem && Array.isArray(contentItem.content) && contentItem.content.length) {
          contentEl.innerHTML = contentItem.content
            .map((p, index) => `
              ${index > 0 && index % 4 === 0 ? '<div class="reading-inline-divider" aria-hidden="true"><span>✦</span></div>' : ''}
              <p>${esc(p)}</p>
            `)
            .join('');
        } else {
          contentEl.innerHTML = '<p>這篇還沒有庫內閱讀內容。</p>';
        }

        if (scriptItem.openingLine) {
          readingAfterword.hidden = false;
          readingOpeningLine.textContent = scriptItem.openingLine;
          readingOpeningSpeaker.textContent =
            [scriptItem.character, scriptItem.characterSummary].filter(Boolean).join('・') || '角色';
        } else {
          readingAfterword.hidden = true;
        }

        /*const detailHref = `./detail.html#${encodeURIComponent(id)}`;
        backToDetailEl.href = detailHref;

         if (Array.isArray(scriptItem.links) && scriptItem.links.length) {
          linksEl.innerHTML = scriptItem.links.map((link, index) => `
            <a
              class="btn ${index === 0 ? 'primary' : 'ghost'}"
              href="${esc(link.url)}"
              target="_blank"
              rel="noreferrer"
            >${esc(link.name)}</a>
          `).join('');
        } else {
          linksEl.innerHTML = '';
        } */

        const detailHref = `./detail.html#${encodeURIComponent(id)}`;
        backToDetailEl.href = detailHref;

        const hasExternalLinks =
          Array.isArray(scriptItem.links) && scriptItem.links.length > 0;

        if (readingExitNote) {
          readingExitNote.textContent = hasExternalLinks
            ? '書頁已至此處。若願繼續前行，可留在書庫回望篇章，亦可前往外部 AI 平台，在彼境中展開互動。不同平台各有其規範與使用環境，還請留意後再前行。'
            : '書頁已至此處。若願繼續前行，可留在書庫回望篇章。';
        }

        const internalBtn = `
          <a
            class="btn primary"
            href="${detailHref}"
          >回劇本頁</a>
        `;

        const externalBtns = hasExternalLinks
          ? scriptItem.links.map(link => `
              <a
                class="btn ghost external-link"
                href="${esc(link.url)}"
                target="_blank"
                rel="noreferrer"
              >↗ ${esc(link.name)}</a>
            `).join('')
          : '';

        linksEl.innerHTML = internalBtn + externalBtns;

        renderBreadcrumb(scriptItem, id);

      } catch (error) {
        console.error(error);
        titleEl.textContent = '讀取失敗';
        metaEl.textContent = '';
        contentEl.innerHTML = '<p>JSON 資料載入失敗。請確認檔案路徑與格式。</p>';
        linksEl.innerHTML = '';
        hideReadingAfterword();
      }
    }

    function getReadingCover(item) {
       const raw =
        item.cover ||
        item.image ||
        item.coverPath ||
        item.thumbnail ||
        '';

      if (!raw) return '';
      if (/^https?:\/\//i.test(raw)) return raw;

      let path = raw.trim();

      if (path.startsWith('./')) path = path.slice(2);
      if (path.startsWith('/')) path = path.slice(1);

      if (path.startsWith('data/')) {
        return new URL(`../../${path}`, location.href).href;
      }

      return new URL(path, location.href).href;
    }

    function applyReadingCover(item) {
      const cover = getReadingCover(item);
      console.log('reading cover:', cover);

      if (!cover) {
        document.body.classList.remove('has-reading-cover');
        document.documentElement.style.removeProperty('--reading-cover-url');
        if (heroBannerEl) heroBannerEl.classList.add('no-cover');
        return;
      }

      document.body.classList.add('has-reading-cover');
      document.documentElement.style.setProperty(
        '--reading-cover-url',
        `url("${cover}")`
      );

      if (heroBannerEl) {
        heroBannerEl.classList.remove('no-cover');
      }
    }

    initReadingPage().finally(() => {
      updateReadingStageSpace();
      updateReadingProgress();
      setTimeout(() => {
        updateReadingStageSpace();
        updateReadingProgress();
      }, 120);
    });

    window.addEventListener('scroll', requestReadingProgressUpdate, { passive: true });
    window.addEventListener('resize', () => {
      updateReadingStageSpace();
      requestReadingProgressUpdate();
    });

    if ('ResizeObserver' in window && readingFixedStage) {
      const stageObserver = new ResizeObserver(() => {
        updateReadingStageSpace();
        requestReadingProgressUpdate();
      });
      stageObserver.observe(readingFixedStage);
    }
  </script>

  <script>
    (function () {
      const key = "site-theme";
      const html = document.documentElement;
      const toggle = document.getElementById("themeToggle");
      const text = document.getElementById("themeText");
      const icon = document.getElementById("themeIcon");

      function applyTheme(theme) {
        html.setAttribute("data-theme", theme);
        if (text) text.textContent = theme === "light" ? "淺色" : "深色";
        if (icon) icon.textContent = theme === "light" ? "☀" : "☾";
      }

      const saved = localStorage.getItem(key);
      const prefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
      applyTheme(saved || (prefersLight ? "light" : "dark"));

      if (toggle) {
        toggle.addEventListener("click", function () {
          const current = html.getAttribute("data-theme") === "light" ? "light" : "dark";
          const next = current === "light" ? "dark" : "light";
          localStorage.setItem(key, next);
          applyTheme(next);
        });
      }
    })();
  </script>
<script src="./protect.js"></script>
</body>
</html>
